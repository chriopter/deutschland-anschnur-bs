name: Muschel prüfen

on:
  push:
    branches: [haupt]
  pull_request:
    branches: [haupt]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: muschel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  muschel-pruefen:
    name: Muschel prüfen
    runs-on: ubuntu-latest
    steps:
      - name: Quelltext auschecken
        uses: actions/checkout@v4

      - name: Python bereitstellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Befehlsakten prüfen
        run: ./anschnur-pruefen

      - name: Muschel prüfen
        run: python -m unittest tests/test_muschel.py -v

      - name: Einrichtung prüfen
        run: |
          ziel="$(mktemp -d)"
          HOME="$ziel/heim" ./einrichten
          "$ziel/heim/.local/bin/anschnur-pruefen"
          "$ziel/heim/.local/bin/muschel" hilfe
          HOME="$ziel/heim" ./entfernen

          PREFIX="$ziel/system" ./einrichten --system
          "$ziel/system/bin/anschnur-pruefen"
          "$ziel/system/bin/muschel" hilfe
          PREFIX="$ziel/system" ./entfernen --system
