name: Muschel prüfen

on:
  push:
    branches: [haupt]
  pull_request:
    branches: [haupt]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: muschel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  muschel-pruefen:
    name: Muschel prüfen
    runs-on: ubuntu-latest
    steps:
      - name: Quelltext auschecken
        uses: actions/checkout@v4

      - name: Python bereitstellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Befehlsakten prüfen
        run: ./anschnur-pruefen

      - name: Muschel prüfen
        run: python -m unittest tests/test_muschel.py -v

      - name: Liesmich-Befehle prüfen
        run: |
          ./befehle-in-liesmich
          git diff --exit-code -- LIESMICH.txt

      - name: Direktstart prüfen
        run: |
          ./muschel hilfe
          ./muschel verzeichnis liste .
