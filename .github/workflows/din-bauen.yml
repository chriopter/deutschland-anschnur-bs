name: DIN bauen

on:
  push:
    branches: [haupt]
  pull_request:
    branches: [haupt]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: din-${{ github.ref }}
  cancel-in-progress: true

jobs:
  din-bauen:
    name: Bogen-DIN bauen
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    environment:
      name: github-pages
    steps:
      - name: Abhängigkeiten installieren
        run: |
          pacman -Syu --noconfirm --needed base-devel git python archiso grub syslinux squashfs-tools xorriso dosfstools mtools libisoburn
          useradd -m bauer
          printf 'bauer ALL=(ALL) NOPASSWD: ALL\n' > /etc/sudoers.d/bauer

      - name: Quelltext auschecken
        uses: actions/checkout@v4

      - name: Muschel prüfen
        run: python -m unittest tests/test_muschel.py -v

      - name: Muschelpaket fertigen
        run: |
          sed -i "s/^pkgver=.*/pkgver=0.1.${GITHUB_RUN_NUMBER}/" pakete/anschnur-muschel/PKGBUILD
          chown -R bauer:bauer "$GITHUB_WORKSPACE"
          su bauer -c 'cd "$GITHUB_WORKSPACE/pakete/anschnur-muschel" && makepkg -s --noconfirm'
          mkdir -p paketablage/x86_64
          cp pakete/anschnur-muschel/*.pkg.tar.* paketablage/x86_64/
          repo-add paketablage/x86_64/deutschland-anschnur.db.tar.gz paketablage/x86_64/*.pkg.tar.*

      - name: Bogen-Referenzprofil vorbereiten
        run: |
          rm -rf bauprofil
          cp -a /usr/share/archiso/configs/releng bauprofil
          cp -a din/bogenprofil/airootfs/. bauprofil/airootfs/
          printf 'anschnur-muschel\n' >> bauprofil/packages.x86_64
          python - <<'PY'
          from pathlib import Path
          arbeitsort = Path.cwd()
          profil = Path('bauprofil/profiledef.sh')
          text = profil.read_text()
          vorgaben = {
              'iso_name': 'deutschland-anschnur-bs',
              'iso_label': 'DABS_$(date +%Y%m)',
              'iso_publisher': 'Deutschland Anschnur BS <https://github.com/chriopter/deutschland-anschnur-bs>',
              'iso_application': 'Deutschland Anschnur BS Betriebsabbild',
          }
          zeilen = []
          for zeile in text.splitlines():
              schluessel = zeile.split('=', 1)[0]
              if schluessel in vorgaben:
                  zeile = f'{schluessel}="{vorgaben[schluessel]}"'
              zeilen.append(zeile)
          profil.write_text('\n'.join(zeilen) + '\n')

          pacman = Path('bauprofil/pacman.conf')
          pacman_text = pacman.read_text()
          eintrag = f'''[deutschland-anschnur]\nSigLevel = Optional TrustAll\nServer = file://{arbeitsort}/paketablage/$arch\n\n'''
          if '[deutschland-anschnur]' not in pacman_text:
              pacman.write_text(pacman_text.replace('[core]\n', eintrag + '[core]\n', 1))
          PY

      - name: DIN bauen
        run: mkarchiso -v -w arbeit -o ausgabe bauprofil

      - name: Prüfsummen erzeugen
        run: |
          cd ausgabe
          sha256sum *.iso > SHA256SUMMEN

      - name: DIN als Änderungsanlage bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: deutschland-anschnur-bs-${{ github.sha }}
          path: |
            ausgabe/*.iso
            ausgabe/SHA256SUMMEN
          if-no-files-found: error
          retention-days: 14

      - name: Paketablage als Netzbestand vorbereiten
        if: github.event_name == 'push' && github.ref == 'refs/heads/haupt'
        run: |
          cp ausgabe/SHA256SUMMEN paketablage/SHA256SUMMEN-DIN

      - name: Paketablage als Änderungsanlage bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: deutschland-anschnur-paketablage-${{ github.sha }}
          path: paketablage
          if-no-files-found: error
          retention-days: 14

      - name: Paketablage hochreichen
        if: github.event_name == 'push' && github.ref == 'refs/heads/haupt'
        uses: actions/upload-pages-artifact@v3
        with:
          path: paketablage

      - name: Paketablage veröffentlichen
        if: github.event_name == 'push' && github.ref == 'refs/heads/haupt'
        continue-on-error: true
        uses: actions/deploy-pages@v4
