name: DIN bauen

on:
  push:
    branches: [haupt]
  pull_request:
    branches: [haupt]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: din-${{ github.ref }}
  cancel-in-progress: true

jobs:
  din-bauen:
    name: Bogen-DIN bauen
    runs-on: ubuntu-latest
    timeout-minutes: 90
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - name: Grundwerkzeuge bereitstellen
        run: pacman -Sy --noconfirm --needed git ca-certificates

      - name: Quelltext auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Paketzwischenspeicher übernehmen
        uses: actions/cache@v4
        with:
          path: /var/cache/pacman/pkg
          key: pacman-${{ runner.os }}-${{ hashFiles('.github/workflows/din-bauen.yml', 'din/bogenprofil/packages.x86_64', 'pakete/**/PKGBUILD') }}
          restore-keys: |
            pacman-${{ runner.os }}-

      - name: Abhängigkeiten installieren
        run: |
          pacman -Syu --noconfirm --needed base-devel git python archiso grub syslinux squashfs-tools xorriso dosfstools mtools libisoburn pacman-contrib
          useradd -m bauer
          printf 'bauer ALL=(ALL) NOPASSWD: ALL\n' > /etc/sudoers.d/bauer

      - name: Muschel prüfen
        run: python -m unittest tests/test_muschel.py -v

      - name: Muschelpaket fertigen
        run: |
          sed -i "s/^pkgver=.*/pkgver=0.1.${GITHUB_RUN_NUMBER}/" pakete/anschnur-muschel/PKGBUILD
          chown -R bauer:bauer "$GITHUB_WORKSPACE"
          su bauer -c 'cd "$GITHUB_WORKSPACE/pakete/anschnur-muschel" && makepkg -s --noconfirm'
          mkdir -p paketablage/x86_64
          cp pakete/anschnur-muschel/*.pkg.tar.* paketablage/x86_64/
          repo-add paketablage/x86_64/deutschland-anschnur.db.tar.gz paketablage/x86_64/*.pkg.tar.*

      - name: DIN-Erfordernis feststellen
        id: din_bedarf
        shell: bash
        env:
          EREIGNIS: ${{ github.event_name }}
          VORHER: ${{ github.event.before }}
          GRUNDZWEIG: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          bauen=false

          if [[ "${EREIGNIS}" == "workflow_dispatch" || "${EREIGNIS}" == "schedule" ]]; then
            bauen=true
          else
            if [[ "${EREIGNIS}" == "pull_request" && -n "${GRUNDZWEIG}" ]]; then
              git fetch --no-tags origin "${GRUNDZWEIG}"
              basis="$(git merge-base "origin/${GRUNDZWEIG}" HEAD)"
              geaendert="$(git diff --name-only "${basis}" HEAD --)"
            elif [[ -n "${VORHER}" && ! "${VORHER}" =~ ^0+$ ]] && git cat-file -e "${VORHER}^{commit}" 2>/dev/null; then
              geaendert="$(git diff --name-only "${VORHER}" HEAD --)"
            else
              geaendert=""
              bauen=true
            fi

            if [[ "${bauen}" != "true" ]]; then
              while IFS= read -r pfad; do
                [[ -z "${pfad}" ]] && continue
                case "${pfad}" in
                  din/**|.github/workflows/din-bauen.yml)
                    bauen=true
                    break
                    ;;
                esac
              done <<< "${geaendert}"
            fi
          fi

          echo "bauen=${bauen}" >> "${GITHUB_OUTPUT}"
          if [[ "${bauen}" == "true" ]]; then
            echo "DIN-Fertigung: erforderlich"
          else
            echo "DIN-Fertigung: ausgelassen; Paketablage wird erneuert"
          fi

      - name: Bogen-Referenzprofil vorbereiten
        if: steps.din_bedarf.outputs.bauen == 'true'
        run: |
          rm -rf bauprofil
          cp -a /usr/share/archiso/configs/releng bauprofil
          cp -a din/bogenprofil/airootfs/. bauprofil/airootfs/
          printf 'anschnur-muschel\n' >> bauprofil/packages.x86_64
          python - <<'PY'
          from pathlib import Path
          arbeitsort = Path.cwd()
          profil = Path('bauprofil/profiledef.sh')
          text = profil.read_text()
          vorgaben = {
              'iso_name': 'deutschland-anschnur-bs',
              'iso_label': 'DABS_$(date +%Y%m)',
              'iso_publisher': 'Deutschland Anschnur BS <https://github.com/chriopter/deutschland-anschnur-bs>',
              'iso_application': 'Deutschland Anschnur BS Betriebsabbild',
          }
          zeilen = []
          for zeile in text.splitlines():
              schluessel = zeile.split('=', 1)[0]
              if schluessel in vorgaben:
                  zeile = f'{schluessel}="{vorgaben[schluessel]}"'
              zeilen.append(zeile)
          profil.write_text('\n'.join(zeilen) + '\n')

          pacman = Path('bauprofil/pacman.conf')
          pacman_text = pacman.read_text()
          eintrag = f'''[deutschland-anschnur]\nSigLevel = Optional TrustAll\nServer = file://{arbeitsort}/paketablage/$arch\n\n'''
          if '[deutschland-anschnur]' not in pacman_text:
              pacman.write_text(pacman_text.replace('[core]\n', eintrag + '[core]\n', 1))
          PY

      - name: DIN bauen
        if: steps.din_bedarf.outputs.bauen == 'true'
        run: mkarchiso -v -w arbeit -o ausgabe bauprofil

      - name: Prüfsummen erzeugen
        if: steps.din_bedarf.outputs.bauen == 'true'
        run: |
          cd ausgabe
          cp *.iso deutschland-anschnur-bs-aktuell.iso
          sha256sum deutschland-anschnur-bs-aktuell.iso > SHA256SUMMEN

      - name: DIN als aktuelle Freigabe bereitstellen
        if: steps.din_bedarf.outputs.bauen == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/haupt'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: aktuell
          name: Aktuelle DIN-Anlage
          body: Automatisch erneuerte DIN-Anlage des Hauptzweigs.
          make_latest: true
          prerelease: false
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            ausgabe/deutschland-anschnur-bs-aktuell.iso
            ausgabe/SHA256SUMMEN

      - name: DIN als Änderungsanlage bereitstellen
        if: steps.din_bedarf.outputs.bauen == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: deutschland-anschnur-bs-${{ github.sha }}
          path: |
            ausgabe/*.iso
            ausgabe/SHA256SUMMEN
          if-no-files-found: error
          retention-days: 14

      - name: Paketablage als Netzbestand vorbereiten
        run: |
          if [ -f ausgabe/SHA256SUMMEN ]; then
            cp ausgabe/SHA256SUMMEN paketablage/SHA256SUMMEN-DIN
          fi
          touch paketablage/.nojekyll
          for endung in db files; do
            pfad="paketablage/x86_64/deutschland-anschnur.${endung}"
            if [ -L "${pfad}" ]; then
              ziel="$(readlink -f "${pfad}")"
              rm "${pfad}"
              cp "${ziel}" "${pfad}"
            fi
          done
          cat > paketablage/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>Deutschland Anschnur Paketablage</title>
          <h1>Deutschland Anschnur Paketablage</h1>
          <p><a href="x86_64/">x86_64</a></p>
          HTML
          cat > paketablage/x86_64/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>Deutschland Anschnur Paketablage x86_64</title>
          <h1>Deutschland Anschnur Paketablage x86_64</h1>
          <ul>
            <li><a href="deutschland-anschnur.db">Paketverzeichnis</a></li>
            <li><a href="deutschland-anschnur.files">Dateiverzeichnis</a></li>
          </ul>
          HTML

      - name: Paketablage als Änderungsanlage bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: deutschland-anschnur-paketablage-${{ github.sha }}
          path: paketablage
          if-no-files-found: error
          retention-days: 14

      - name: Paketablage hochreichen
        if: github.event_name == 'push' && github.ref == 'refs/heads/haupt'
        uses: actions/upload-pages-artifact@v3
        with:
          path: paketablage

      - name: Paketablage veröffentlichen
        if: github.event_name == 'push' && github.ref == 'refs/heads/haupt'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Paketzwischenspeicher beschneiden
        if: always()
        run: paccache -rk2 || true
